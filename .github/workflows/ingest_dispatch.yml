# 群眾回報（免 GitHub 帳號）：Cloudflare Worker 中繼驗證後 repository_dispatch 到這裡。
# Worker 持有 token 與 Turnstile 密鑰（見 docs/report-relay.md）；本 workflow 只負責
# 結構化欄位 → reports.csv（append-only）。欄位已在 Worker 與 ingest 兩端各驗一次。
name: ingest-dispatch

on:
  repository_dispatch:
    types: [outcome-report]

permissions:
  contents: write

concurrency:
  group: sunset-logs
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install .

      - name: Append report (structured, injection-safe)
        id: ingest
        env:
          DISPATCH_OUTCOME: ${{ github.event.client_payload.outcome }}
          DISPATCH_DATE: ${{ github.event.client_payload.date }}
          DISPATCH_VIEWPOINT: ${{ github.event.client_payload.viewpoint }}
          DISPATCH_NOTE: ${{ github.event.client_payload.note }}
          DISPATCH_SUN: ${{ github.event.client_payload.sun }}
          DISPATCH_REPORTER: ${{ github.event.client_payload.reporter }}
        run: |
          set +e
          python -m sunset ingest-dispatch
          echo "ok=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Commit report log (append-only)
        if: steps.ingest.outputs.ok == '0'
        run: |
          git config user.name "sunset-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/logs/reports.csv
          if git diff --cached --quiet; then
            echo "no report changes"
          else
            git commit -m "log: crowd report via relay $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
