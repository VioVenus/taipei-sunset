# 每週日 20:00（台北）＝ 12:00 UTC：週報（過去 7 天預測 vs 回報 + 未來展望）。
# GitHub Actions cron 有 ±數分鐘飄移，可接受。
name: weekly-review

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install .

      - name: Send weekly review
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
        run: python -m sunset weekly-review
