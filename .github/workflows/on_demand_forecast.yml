# 隨時查詢：手機 GitHub app 或網頁 Actions 頁面按 Run workflow 即可，
# 分析結果推播到已設定的通道（Telegram / ntfy），並寫入預測日誌。
name: on-demand-forecast

on:
  workflow_dispatch:
    inputs:
      date:
        description: "今天|明天|後天|YYYY-MM-DD"
        default: "今天"
      viewpoint:
        description: "點位（auto = 自動推薦）"
        type: choice
        options: [auto, jiantan_laodifang, dadaocheng_wharf]
        default: auto
      front_flag:
        description: "鋒面/颱風外圍 48h 內（人工 flag）"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sunset-logs
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install .

      - name: Analyze and push
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
          IN_DATE: ${{ inputs.date }}
          IN_VIEWPOINT: ${{ inputs.viewpoint }}
        run: |
          ARGS=(analyze --date "$IN_DATE" --send --log)
          if [ "$IN_VIEWPOINT" != "auto" ]; then ARGS+=(--viewpoint "$IN_VIEWPOINT"); fi
          if [ "${{ inputs.front_flag }}" = "true" ]; then ARGS+=(--front); fi
          python -m sunset "${ARGS[@]}"

      - name: Commit prediction log (append-only)
        run: |
          git config user.name "sunset-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/logs/predictions.csv
          if git diff --cached --quiet; then
            echo "no prediction log changes"
          else
            git commit -m "log: on-demand prediction $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
