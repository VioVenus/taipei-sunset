# 一次性遷移／之後可重複使用的同步：把本分支完整推到公開 repo taipei-sunset 的 main。
# 需要 secret PUBLIC_REPO_TOKEN：**classic** PAT，勾 `repo` + `workflow` 兩個 scope。
# 為何必須 classic + workflow：本專案含 .github/workflows/*，GitHub 拒絕缺 workflow
# scope 的 PAT 推送工作流程檔；fine-grained PAT 無對應權限、無法推 workflow 檔。
# （classic `repo` 會授權所有 repo，同步完成後可刪除此 token。）
# 替代路徑：本機以 SSH 推送（SSH 金鑰不受 workflow scope 限制），見 docs/public-plan.md §8。
name: sync-public

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "輸入 push 以確認（會 force-push 覆蓋 taipei-sunset 的 main）"
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: inputs.confirm == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 不保留 checkout 的 GITHUB_TOKEN 憑證，否則它會以 extraheader 蓋掉
          # 下方 push URL 內嵌的 PUBLIC_REPO_TOKEN（導致以 github-actions[bot] 身分被 403）
          persist-credentials: false

      - name: Push to public repo
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::未設定 PUBLIC_REPO_TOKEN secret"; exit 1
          fi
          git push --force \
            "https://x-access-token:${TOKEN}@github.com/VioVenus/taipei-sunset.git" \
            "HEAD:main"
          echo "✅ 已推送 $(git rev-parse --short HEAD) → taipei-sunset:main"
