name: 🌇 回報今晚實際結果
description: 看完日落回報 A/B/C/D，你的回報會自動進入校準資料（機器人會自動處理並關閉這張 issue）
title: "[回報] 今晚實際結果"
labels: ["outcome-report"]
body:
  - type: markdown
    attributes:
      value: |
        感謝回報！送出後機器人會自動記錄並關閉這張 issue。
        同一人同一天多次回報只採計最新一筆；多人回報以多數決聚合。
  - type: dropdown
    id: outcome
    attributes:
      label: 今晚天空色彩・實際結果（只看天空多精彩，跟看不看得到太陽本身無關）
      options:
        - A 灰暗沒色彩（低雲/降雨整片罩住）
        - B 橘色天空／霞光（看不看得到太陽本身都算）
        - C 局部火燒
        - D 全面火燒
    validations:
      required: true
  - type: dropdown
    id: sun
    attributes:
      label: 太陽本身（選填）
      description: 日輪有沒有被地平線附近的低雲擋住？這是跟色彩獨立的另一軸。
      options:
        - 有看到太陽本身
        - 太陽被低雲擋住
        - 不確定
  - type: input
    id: date
    attributes:
      label: 日期
      description: 留空或填「今天」；跨午夜補報可填「昨天」或 YYYY-MM-DD（僅限兩天內）
      placeholder: 今天
  - type: dropdown
    id: viewpoint
    attributes:
      label: 點位
      options:
        - jiantan_laodifang（劍潭山老地方觀機平台）
        - dadaocheng_wharf（大稻埕碼頭）
        - 其他／不確定
  - type: input
    id: note
    attributes:
      label: 備註
      description: 選填，例如「西北側局部燒約 10 分鐘」（會公開顯示，勿填個資）
