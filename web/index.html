<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>台灣日落 — 火燒雲預測</title>
  <meta name="description" content="全台日落／火燒雲預測：四情境機率區間、地區點位、太陽時間軸、出發前即時影像" />
  <meta name="theme-color" content="#14161d" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#faf7f2" media="(prefers-color-scheme: light)" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="topbar-date">—</h1>
    <div class="chips" id="date-chips" role="tablist" aria-label="日期選擇">
      <button class="chip active" data-offset="0" data-i18n="chips.today">今天</button>
      <button class="chip" data-offset="1" data-i18n="chips.tomorrow">明天</button>
      <button class="chip" data-offset="2" data-i18n="chips.dayAfter">後天</button>
      <button class="chip" data-offset="3" data-i18n="chips.plus3">+3天</button>
    </div>
    <select id="lang-select" class="lang-select" aria-label="Language / 語言"></select>
    <button class="refresh" id="refresh-btn" aria-label="重新整理">↻</button>
  </header>

  <main id="main">
    <!-- 預報分頁 -->
    <section id="tab-forecast" class="tab active" aria-label="預報">
      <div id="stale-banner" class="banner warn hidden"></div>
      <div id="preliminary-banner" class="banner warn hidden" data-i18n="banner.preliminary"></div>
      <div class="card hidden full" id="onboard-card"></div>
      <div class="region-bar full" id="region-bar" aria-label="地區與點位選擇"></div>
      <div id="verdict-card" class="card verdict-card full skeleton" aria-live="polite"></div>
      <div class="card hidden" id="light-card" aria-live="polite"></div>
      <div class="day-strip full" id="day-strip" aria-label="三日概覽"></div>
      <p class="footnote hidden" id="better-hint"></p>
      <div class="card" id="timeline-card"></div>
      <div class="card" id="scenario-card"></div>
      <div class="card" id="reasons-card"></div>
      <div class="card" id="checklist-card"></div>
      <div class="card" id="others-card"></div>
      <p class="footnote" id="data-footnote"></p>
    </section>

    <!-- 紀錄分頁 -->
    <section id="tab-log" class="tab" aria-label="紀錄">
      <div class="card full">
        <h2 id="report-title">—</h2>
        <div class="chips report-day" id="report-day" role="tablist" aria-label="回報日期">
          <button class="chip active" data-day="0" data-i18n="chips.today">今天</button>
          <button class="chip" data-day="1" data-i18n="chips.yesterday">昨天</button>
        </div>
        <p class="muted small" id="report-context"></p>
        <div class="report-grid">
          <button class="report-btn oa" data-outcome="A">🌫 A<span data-i18n="log.oa">灰暗沒色彩</span></button>
          <button class="report-btn ob" data-outcome="B">🌇 B<span data-i18n="log.ob">只有橘色天空</span></button>
          <button class="report-btn oc" data-outcome="C">🔥 C<span data-i18n="log.oc">局部火燒</span></button>
          <button class="report-btn od" data-outcome="D">🌋 D<span data-i18n="log.od">全面火燒</span></button>
        </div>
        <input type="text" id="report-note" data-i18n-ph="log.notePh" placeholder="" maxlength="80" />
        <p class="footnote" id="report-status"></p>
        <p class="muted small" data-i18n="log.explain"></p>
      </div>
      <div class="card" id="weekly-card"></div>
      <div class="card" id="history-card"></div>
    </section>

    <!-- 設定分頁 -->
    <section id="tab-settings" class="tab" aria-label="設定">
      <div class="card">
        <h2 data-i18n="settings.installTitle"></h2>
        <ul class="status-list">
          <li data-i18n-html="settings.installIos"></li>
          <li data-i18n-html="settings.installAndroid"></li>
          <li data-i18n="settings.installOffline"></li>
        </ul>
      </div>
      <div class="card">
        <h2 data-i18n="settings.statusTitle"></h2>
        <ul class="status-list" id="status-list"></ul>
      </div>
      <div class="card">
        <h2 data-i18n="settings.aboutTitle"></h2>
        <p class="muted small" id="about-text"></p>
        <p class="muted small" data-i18n="settings.aboutPara"></p>
        <p class="footnote" data-i18n="settings.copyright"></p>
      </div>
      <!-- 維護者卡：預設隱藏（連點上方版本文字 7 下開啟）。這是介面整理，不是保密機制——
           token 只存訪客自己的 localStorage，真正的機密只活在 GitHub Secrets。 -->
      <div class="card hidden" id="maint-card">
        <h2 data-i18n="settings.maintTitle"></h2>
        <p class="muted small" data-i18n="settings.maintDesc"></p>
        <input type="password" id="gh-token" placeholder="github_pat_…" autocomplete="off" />
        <div class="row">
          <button class="btn" id="save-token" data-i18n="settings.save"></button>
          <button class="btn ghost" id="test-token" data-i18n="settings.test"></button>
          <button class="btn ghost" id="exit-maint" data-i18n="settings.exitMaint"></button>
        </div>
        <p class="footnote" id="token-status"></p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="主導覽">
    <button class="nav-btn active" data-tab="forecast">🌇<span data-i18n="nav.forecast">預報</span></button>
    <button class="nav-btn" data-tab="log">📝<span data-i18n="nav.log">紀錄</span></button>
    <button class="nav-btn" data-tab="settings">⚙️<span data-i18n="nav.settings">設定</span></button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
